name: Weekly Digest → Telegram

on:
  schedule:
    - cron: '0 0 * * 1'   # 매주 월요일 00:00 UTC = 한국 09:00 KST
  workflow_dispatch:        # GitHub에서 수동 실행 버튼 (테스트용)

jobs:
  send-digest:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: requests 설치
        run: pip install requests

      - name: Weekly Digest 전송
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python send_digest.py
